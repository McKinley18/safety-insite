version: '3.8'
services:
  db:
    image: postgres:16-alpine
    container_name: safescope-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: safescope
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: safescope-backend
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/safescope
    ports:
      - '3000:3000'

volumes:
  pgdata:
