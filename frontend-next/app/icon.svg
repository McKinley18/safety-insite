<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AuditAlly app icon</title>
  <desc id="desc">A blue rounded square app icon with a slim white A and green checkmark.</desc>

  <defs>
    <linearGradient id="bg" x1="70" y1="42" x2="430" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1D72B8"/>
      <stop offset="0.58" stop-color="#0F5FBC"/>
      <stop offset="1" stop-color="#0B1320"/>
    </linearGradient>
    <linearGradient id="check" x1="201" y1="293" x2="397" y2="375" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7CE35B"/>
      <stop offset="1" stop-color="#3FA43B"/>
    </linearGradient>
  </defs>

  <rect x="48" y="48" width="416" height="416" rx="96" fill="url(#bg)"/>

  <!-- Slim open A mark, no horizontal crossbar -->
  <path
    d="M150 348 L235 164 C243 146 269 146 277 164 L362 348"
    stroke="white"
    stroke-width="31"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Check mark -->
  <path
    d="M197 336 L256 392 L385 260"
    stroke="url(#check)"
    stroke-width="36"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
