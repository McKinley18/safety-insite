<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 160" role="img" aria-labelledby="title desc">
  <title id="title">GuideGuard shield mark</title>
  <desc id="desc">GuideGuard light-blue shield with magnifying glass and verification path.</desc>
  <defs>
    <linearGradient id="shield" x1="32" y1="10" x2="148" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7DE3FF"/>
      <stop offset="1" stop-color="#1D72B8"/>
    </linearGradient>
  </defs>

  <!-- shield only: no background plate -->
  <path d="M90 8 148 31v48c0 38-21 66-58 83-37-17-58-45-58-83V31L90 8Z"
        fill="url(#shield)"/>

  <!-- magnifying glass inside shield -->
  <circle cx="79" cy="71" r="25"
          fill="none"
          stroke="#0B1320"
          stroke-width="11"/>

  <path d="M97 89 121 113"
        fill="none"
        stroke="#0B1320"
        stroke-width="12"
        stroke-linecap="round"/>

  <!-- small verification path inside lens -->
  <path d="M66 72 76 82 94 59"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="7"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
