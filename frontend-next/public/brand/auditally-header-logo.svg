<svg width="780" height="190" viewBox="0 0 780 190" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GuideGuard powered by HazLenz AI</title>
  <desc id="desc">GuideGuard wordmark with a slim blue A mark and green checkmark.</desc>

  <defs>
    <linearGradient id="aBlue" x1="54" y1="34" x2="158" y2="144" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5DB7FF"/>
      <stop offset="0.58" stop-color="#1D72B8"/>
      <stop offset="1" stop-color="#0F5FBC"/>
    </linearGradient>
    <linearGradient id="checkGreen" x1="108" y1="98" x2="197" y2="139" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7CE35B"/>
      <stop offset="1" stop-color="#3FA43B"/>
    </linearGradient>
  </defs>

  <!-- Slim open A icon, no horizontal crossbar -->
  <g transform="translate(48 24)">
    <path
      d="M34 136 L89 30 C93 22 105 22 109 30 L164 136"
      stroke="url(#aBlue)"
      stroke-width="19"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <path
      d="M82 108 L113 138 L184 66"
      stroke="url(#checkGreen)"
      stroke-width="19"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>

  <!-- High-contrast wordmark for dark header -->
  <text x="244" y="90" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="62" font-weight="900" letter-spacing="-3">
    <tspan fill="#FFFFFF">Audit</tspan><tspan fill="#5DB7FF">Ally</tspan>
  </text>

  <text x="248" y="128" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="21" font-weight="800" letter-spacing="-0.2">
    <tspan fill="#D8ECFF">Powered by </tspan><tspan fill="#7CE35B">HazLenz AI</tspan>
  </text>
</svg>
